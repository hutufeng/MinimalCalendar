name: Build and Release Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # 必须赋予写权限，以允许 Action 创建 Release 版本库
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: 初始化 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 赋予 Gradle 脚本执行权限
      run: chmod +x gradlew

    - name: 编译精简发布版 (Release) APK
      run: ./gradlew assembleRelease

    - name: 重命名发版 APK 以便于更直观的展示
      run: mv app/build/outputs/apk/release/app-release.apk MinimalCalendar-v1.0.${{ github.run_number }}.apk

    - name: 发版到 GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "Minimal Calendar v1.0.${{ github.run_number }}"
        body: "🟢 自动化触发的云端编译版本。\n已进行体积优化 (3M左右)。安全可靠，可直接下载并在安卓手机安装运行。"
        files: MinimalCalendar-v1.0.${{ github.run_number }}.apk
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
